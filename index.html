<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Theme Picker</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Poppins:wght@400;600;800&family=Playfair+Display:wght@600;700&family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <aside class="sidebar">
    <h2>Theme Picker</h2>
    <p>Choose a real-looking website theme instantly.</p>

    <button class="filter-btn active" data-category="all">All Themes</button>
    <button class="filter-btn" data-category="business">Business</button>
    <button class="filter-btn" data-category="coffee">Coffee Shop</button>
    <button class="filter-btn" data-category="saas">Tech SaaS</button>
    <button class="filter-btn" data-category="luxury">Luxury</button>
    <button class="filter-btn" data-category="startup">Startup</button>
  </aside>

  <main class="main-content">
    <section class="intro">
      <p class="eyebrow">Theme Gallery</p>
      <h1>Pick a real-looking theme. Launch faster.</h1>
      <p>
        Preview color and font pairings inside a realistic website layout before using them.
      </p>
    </section>

    <section class="theme-grid" id="themeGrid"></section>
  </main>

  <div class="modal fade" id="themeModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <p class="modal-label">Live Website Preview</p>
            <h5 class="modal-title" id="themeModalTitle"></h5>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <div id="livePreview"></div>

          <div class="theme-summary">
            <h3>Theme Details</h3>
            <div id="themeDetails" class="details-grid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="copy-toast">Copied!</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
